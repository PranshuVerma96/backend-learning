<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 100px;
      margin: 0;
      color: #38bdf8;
    }

    h2 {
      margin: 10px 0;
      font-size: 30px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      padding: 10px 20px;
      background: #38bdf8;
      color: #000;
      border-radius: 5px;
      font-weight: bold;
    }

    a:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! The page you are looking for does not exist.</p>
    <a href="/">Go Back Home</a>
  </div>
</body>
</html>
